<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Plate circle -->
  <circle cx="20" cy="20" r="18" stroke="#39FF14" stroke-width="2.5" opacity="0.9"/>
  <!-- Macro pie segments representing protein/carbs/fat -->
  <!-- Protein segment (top-right, largest) -->
  <path d="M20 4 A16 16 0 0 1 35.6 24.8 L20 20 Z" fill="#39FF14" opacity="0.85"/>
  <!-- Carbs segment (bottom) -->
  <path d="M35.6 24.8 A16 16 0 0 1 8.2 30.4 L20 20 Z" fill="#39FF14" opacity="0.5"/>
  <!-- Fat segment (top-left) -->
  <path d="M8.2 30.4 A16 16 0 0 1 20 4 L20 20 Z" fill="#39FF14" opacity="0.25"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="3" fill="#0d1117"/>
  <circle cx="20" cy="20" r="1.5" fill="#39FF14" opacity="0.9"/>
</svg>
